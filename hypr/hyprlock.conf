$fontFamily = FiraCode Nerd Font


general {
    hide_cursor = true
}


auth {
	pam:enabled = true
	pam:module = hyprlock
	fingerprint:enabled = true
	fingerprint:ready_message = 󰘤 Unlock Using Fingerprint
	fingerprint:present_message = 󰘤 Scanning Fingerprint
}

background {
    monitor = 
    path = $HOME/Pictures/wallpaper.png
    color = rgba(030408FF)

    blur_size = 6
    blur_passes = 4 
    noise = 0.05
    contrast = 1.3
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0
    ignore_opacity = true
    new_optimizations = true
}


input-field {
    monitor = eDP-1 
    rounding = 2
    shadow_passes = 0
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 1
    dots_center = true
    #font_color = rgba($re0$trF)
    #inner_color = rgba($re2$trF)
    check_color = rgba(152966FF)
    fail_color = rgba(F24848FF)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, 50
    halign = center
    valign = bottom
}

label {
	monitor =
	text = $FPRINTFAIL
	color = rgb(ed8796)
	font_size = 14
	font_family = $fontFamily
	position = 0, 30
	halign = center
	valign = bottom
}

label {
	monitor =
	text = $FPRINTPROMPT
	color = rgb(c6a0f6)
	font_size = 16
	font_family = $fontFamily
	position = 0, 70
	halign = center
	valign = bottom
}

label {
    monitor = 
    shadow_passes = 0
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = rgba($re0$trF)
    font_size = 45
    font_family = $fontFamily
    position = 0, -35
    halign = center
    valign = center
}
