general {
    lock_cmd = sh -c "pidof hyprlock || hyprlock"
    before_sleep_cmd = sh -c "pidof hyprlock || hyprlock"
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off # turn off screen
    on-resume = hyprctl dispatch dpms on # turn on screen
}

listener {
    timeout = 305
    on-timeout = sh -c "pidof hyprlock || hyprlock"
}


listener {
    timeout = 3600
    on-timeout = systemctl suspend
}
