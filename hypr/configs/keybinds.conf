# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty
bind = $mainMod+shift, Q, exec, hyprctl dispatch exit
bind = $mainMod, Z, exec, ~/.apps/zen/zen
bind = $mainMod+shift, Z, exec, ungoogled-chromium --proxy-server="socks5://127.0.0.1:1080"  #open browser
bind = $mainMod, T, exec, Telegram
bind = $mainMod, H, exec, hiddify
bind = $mainMod, F, fullscreen
bind = $mainMod, K, exec, keepass
bind = $mainMod, Y, exec, spotify
bind = $mainMod+shift, T, exec, killall -9 Telegram  #kill tg
bind = $mainMod, O, exec, OBSIDIAN_USE_WAYLAND=1 obsidian -enable-features=UseOzonePlatform -ozone-platform=wayland   #open obsidian
bind = $mainMod SHIFT, X, killactive, # close the active window
bind = $mainMod, W, killactive, # close the active window
bind = $mainMod, L, exec, hyprlock # Lock the screen
#bind = $mainMod, L, exec, swaylock # Lock the screen
bind = $mainMod, M, exec, plasma-emojier # show the logout window
bind = $mainMod SHIFT, M, exit, # Exit Hyprland all together no (force quit Hyprland)
bind = $mainMod, E, exec, thunar # Show the graphical file browser
bind = $mainMod, V, togglefloating, # Allow a window to float
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy # take a screenshot
bind = $mainMod+shift, S, exec, steam
bind = $mainMod, a, exec, ~/wireshark-ecpri-gsm/build/run/wireshark -f 'not (udp port 5702 or udp port 5802 or udp port 6702 or udp port 6802)' -i any
bind = $mainMod+shift, a, exec, ~/wireshark-ecpri-gsm/build/run/wireshark -f 'not (udp port 5702 or udp port 5802 or udp port 6702 or udp port 6802)' -i any -k
bind = $mainMod+shift, Left, movewindow, l
bind = $mainMod+shift, Right, movewindow, r
bind = $mainMod+shift, up, movewindow, u
bind = $mainMod+shift, down, movewindow, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, SPACE, togglefloating
bind = alt, SPACE, exec, wofi # Show the graphicall app launcher
bind = alt, Tab, cyclenext #step forward between windows
bind = alt+shift, Tab, cyclenext, prev #step backwards between windows
bind = alt, Tab, bringactivetotop #step forward between windows
bind = alt+shift, Tab, bringactivetotop #step backwards between windows
bind = SUPER, SPACE, exec, hyprctl switchxkblayout all next
bind = $mainMod, N, exec, ~/.config/hypr/scripts/move_next_mon.sh


bind = $mainMod, Tab, workspace, e+1 #step forward between workspaces
bind = $mainMod+shift, Tab, workspace, e-1 #step backward between wrkspaces



bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%s).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%s).png

bind = ,156, exec, rog-control-center # ASUS Armory crate key
bind = ,211, exec, asusctl profile -n; pkill -SIGRTMIN+8 waybar # Fan Profile key switch between power profiles
bind = ,121, exec, pamixer -t # Speaker Mute FN+F1
bind = ,122, exec, pamixer -d 2 # Volume lower key
bind = ,123, exec, pamixer -i 2 # Volume Higher key
bind = ,256, exec, pamixer --default-source -t # Mic mute key
bind = ,232, exec, brightnessctl set 2%- # Screen brightness down FN+F7
bind = ,233, exec, brightnessctl set 2%+ # Screen brightness up FN+F8
bind = ,237, exec, brightnessctl -d asus::kbd_backlight set 33%- # Keyboard brightness down FN+F2
bind = ,238, exec, brightnessctl -d asus::kbd_backlight set 33%+ # Keyboard brightnes up FN+F3
bind = ,210, exec, asusctl led-mode -n # Switch keyboard RGB profile FN+F4


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, equal, exec, hyprctl dispatch workspace $(( $(hyprctl activeworkspace -j | jq '.id') + 1 ))
bind = $mainMod, minus, exec, hyprctl dispatch workspace $(( $(hyprctl activeworkspace -j | jq '.id') - 1 )) 

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow



#bindl = , Escape, exec, ~/.config/hypr/scripts/toggle-screen.sh
